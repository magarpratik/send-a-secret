name: Backend live deploy

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend/functions

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: npm ci

      - name: Lint the code
        run: npm run lint
        continue-on-error: false

      - name: Build the backend
        run: npm run build
        
      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firebase Functions
        run: npm run deploy
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SEND_A_SECRET }}
